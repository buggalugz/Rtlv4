    - name: Compile Standalone Static Binary
      run: |
        cd rtl-sdr-blog
        mkdir build
        cd build
        cmake ../ -DDETACH_KERNEL_DRIVER=ON -DCMAKE_FIND_LIBRARY_SUFFIXES=".a"
        
        # Build the static library dependencies first
        make rtlsdr_static convenience_static
        
        # Now stitch it all together into a bulletproof static binary
        gcc -static -O2 -I../src -I../include \
          ../src/rtl_tcp.c \
          src/libconvenience_static.a \
          src/librtlsdr_static.a \
          -lusb-1.0 -lm \
          -o src/rtl_tcp
