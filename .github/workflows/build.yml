    - name: Compile Binaries (Static Link)
      run: |
        cd rtl-sdr-blog
        mkdir build
        cd build
        # The EXTRA_FLAGS force a static standalone binary with no external library requirements
        cmake ../ -DDETACH_KERNEL_DRIVER=ON -DCMAKE_EXE_LINKER_FLAGS="-static" -DCMAKE_FIND_LIBRARY_SUFFIXES=".a"
        make rtl_tcp
